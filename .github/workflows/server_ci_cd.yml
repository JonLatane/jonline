  create_github_release:
    name: "GitHub: Release"
    # permissions: write-all
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - deploy_jonlineio_server
      - deploy_jonlineio_preview_generator
      - push_server
      - push_preview_generator
      - test_consistency
      - test_rust_binaries
      # - test_flutter_ui
      - test_tamagui_ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Versioning Data
        id: vars
        run: |-
          be_version="$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/\"//g')"
          sha_short="$(git rev-parse --short=7 HEAD)"
          echo "be_version=${be_version}" >> $GITHUB_OUTPUT
          echo "sha_short=${sha_short}" >> $GITHUB_OUTPUT
          echo "full_version=${be_version}-${sha_short}" >> $GITHUB_OUTPUT

      - name: Store Versioning Data for release ${{ steps.vars.outputs.full_version }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - name: Push tag v${{ steps.vars.outputs.full_version }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          custom_tag: "${{ steps.vars.outputs.full_version }}"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Changelog
        id: changelog
        run: |
          delimiter="$(openssl rand -hex 32)"
          echo "ci_changelog<<${delimiter}" >> $GITHUB_OUTPUT
          echo "$(git --no-pager log -10 --pretty='- [`%h` / *%ch*] %B')" >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT
      - name: Display Changelog (for debugging the CI/CD process)
        run: |
          echo "The string is: \n${{ steps.changelog.outputs.ci_changelog }}"

      - name: Create release v${{ steps.vars.outputs.full_version }}
        uses: ncipollo/release-action@v1
        with:
          name: "v${{ steps.vars.outputs.full_version }} (CI/CD)"
          tag: "v${{ steps.vars.outputs.full_version }}"
          makeLatest: true
          body: |-
            # Jonline CI/CD Release

            ### `v${{ steps.vars.outputs.full_version }}`

            Built by the [Server CI/CD GitHub Action ![Server CI/CD Badge](https://github.com/jonlatane/jonline/actions/workflows/server_ci_cd.yml/badge.svg)](https://github.com/jonlatane/jonline/actions/workflows/server_ci_cd.yml).

            Images are available on DockerHub:

            - [DockerHub: Jonline Server (jonlatane/jonline:${{ steps.vars.outputs.full_version }})](https://hub.docker.com/r/jonlatane/jonline/tags?page=1&name=${{ steps.vars.outputs.full_version }})

            - [DockerHub: Jonline Preview Generator (jonlatane/jonline_preview_generator:${{ steps.vars.outputs.full_version }})](https://hub.docker.com/r/jonlatane/jonline_preview_generator/tags?page=1&name=${{ steps.vars.outputs.full_version }})

            - *In testing/not yet ready for production use:* [DockerHub: JBL (Jonline Balancer of Loads/Load Balancer) (jonlatane/jbl:${{ steps.vars.outputs.full_version }})](https://hub.docker.com/r/jonlatane/jonline_preview_generator/tags?page=1&name=${{ steps.vars.outputs.full_version }})

            A macOS (Apple Silicon) build is also available via Homebrew:

            ```
            brew install jonlatane/jonline/jonline
            ```

            A self-updating Linux build (amd64/arm64) is available as a release tarball:

            ```
            curl -s https://api.github.com/repos/jonlatane/jonline/releases/latest \
              | jq -r '.assets[] | select(.name | test("-linux\\.tar\\.bz2$")) | .browser_download_url' \
              | xargs curl -L -o jonline.tar.bz2
            mkdir jonline && tar xjf jonline.tar.bz2 -C jonline && rm jonline.tar.bz2
            cd jonline
            ./bin/jonline version
            ```

            Run `./bin/jonline help` for other commands, including `update` to self-update in place.

            ## Deployments

            Deployments will be brought up-to-date at around the same time as this release is created.

            First, Jonline.io (and any other "development" deployments) will be updated.

            Then, this release is created (so, Jonline.io should already be updated).

            Finally, Bull City Social and Oak City Social (and any other "production" deployments) will be updated.

            | Deployment | Links | Deployment Version |
            | --- | --- | --- |
            | [Jonline.io ![Jonline.io](https://jonline.io/info_shield?56fdas586)](https://jonline.io)                      | [About](https://jonline.io/about), [Protocol Docs](https://jonline.io/docs/protocol/)           | Development |
            | [BullCity.Social ![BullCity.Social](https://BullCity.Social/info_shield?56fdas586)](https://BullCity.Social/) | [About](https://BullCity.Social/about), [Protocol Docs](https://BullCity.Social/docs/protocol/) | Production  |
            | [OakCity.Social ![OakCity.Social](https://OakCity.Social/info_shield?56fdas586)](https://OakCity.Social/)     | [About](https://OakCity.Social/about), [Protocol Docs](https://OakCity.Social/docs/protocol/)   | Production  |

            ## Changelog

            This list's Markdown was generated with `git log -100 --pretty='- [%h / *%ch*] %B'` at release time:

            ${{ steps.changelog.outputs.ci_changelog }}

  create_homebrew_release:
    name: "Homebrew: Release"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - create_github_release
      - build_rust_binaries_macos
      - build_tamagui_ui
      - build_elm_ui
      - test_consistency

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          be_version="$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')"
          sha_short="$(git rev-parse --short=7 HEAD)"
          echo "be_version=${be_version}" >> $GITHUB_OUTPUT
          echo "sha_short=${sha_short}" >> $GITHUB_OUTPUT
          echo "full_version=${be_version}-${sha_short}" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.full_version }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: actions/cache/restore@v4
        id: web-app-cache
        with:
          path: |
            frontends/tamagui/apps/next/out
            frontends/tamagui/apps/next/out-tamagui
          key: web-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - uses: actions/cache/restore@v4
        id: elm-app-cache
        with:
          path: frontends/elm-spa/public
          key: elm-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - uses: actions/cache/restore@v4
        id: rust-macos-app-cache
        with:
          path: backend/target/release
          key: rust-macos-arm64-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

      # Mirrors deploys/docker/server/Dockerfile's /opt layout, but rooted at a
      # staging dir that becomes /opt/homebrew/etc/jonline on the installed Mac.
      - name: Assemble /opt/homebrew/etc/jonline package layout
        run: |
          set -euo pipefail
          PKG=jonline_pkg
          rm -rf "$PKG"
          mkdir -p "$PKG/docs"

          for bin in jonline disable_cdn_grpc delete_expired_tokens delete_unowned_media \
                     generate_preview_images delete_preview_images set_permission to_db_id to_proto_id; do
            cp "backend/target/release/${bin}" "$PKG/${bin}"
            chmod +x "$PKG/${bin}"
          done

          cp deploys/docker/continuous_delivery_hash "$PKG/continuous_delivery_hash"
          cp docs/protocol.html "$PKG/docs/protocol.html"
          mv "$PKG/jonline" "$PKG/jonline-server"

          mkdir -p "$PKG/tamagui_web" "$PKG/tamagui_web_tamagui" "$PKG/elm_web"
          cp -R frontends/tamagui/apps/next/out/. "$PKG/tamagui_web/"
          cp -R frontends/tamagui/apps/next/out-tamagui/. "$PKG/tamagui_web_tamagui/"
          cp -R frontends/elm-spa/public/. "$PKG/elm_web/"

          # grpcurl is useful to have on a jonline instance (see Dockerfile) --
          # osx_arm64 build, matching the version pinned there.
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v1.8.9/grpcurl_1.8.9_osx_arm64.tar.gz" | tar -xz -C "$PKG" grpcurl

          tar czf "jonline-${{ steps.vars.outputs.full_version }}-macos-arm64.tar.gz" -C "$PKG" .

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(sha256sum jonline-${{ steps.vars.outputs.full_version }}-macos-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload release asset to v${{ steps.vars.outputs.full_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.vars.outputs.full_version }}" "jonline-${{ steps.vars.outputs.full_version }}-macos-arm64.tar.gz" --repo jonlatane/jonline --clobber

      - name: Push Formula/jonline.rb to JonLatane/homebrew-jonline
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/JonLatane/homebrew-jonline.git" tap

          cat > tap/Formula/jonline.rb <<'JONLINE_FORMULA_HEADER_EOF'
          # This file is generated and pushed automatically by the Server CI/CD workflow
          # (create_homebrew_release job) in https://github.com/jonlatane/jonline on every
          # release to main. Don't hand-edit it -- changes will be overwritten. The launcher
          # script below is sourced from docs/homebrew_jonline.sh in that repo.
          class Jonline < Formula
            desc "Jonline federated social server"
            homepage "https://github.com/jonlatane/jonline"
            url "https://github.com/jonlatane/jonline/releases/download/vFULL_VERSION_PLACEHOLDER/jonline-FULL_VERSION_PLACEHOLDER-macos-arm64.tar.gz"
            sha256 "SHA256_PLACEHOLDER"
            version "FULL_VERSION_PLACEHOLDER"
            license "AGPL-3.0-only"

            depends_on arch: :arm64
            depends_on "libpq"

            def install
              (etc/"jonline").install Dir["*"]
              (bin/"jonline").write <<~SCRIPT
          JONLINE_FORMULA_HEADER_EOF

          # docs/homebrew_jonline.sh is plain, standalone bash aside from the
          # @@JONLINE_ETC@@ placeholder, which becomes Ruby's `#{etc}` interpolation
          # here -- Homebrew resolves that to the real install prefix at `brew install`
          # time, so it can't be a fixed value baked in at CI time.
          sed -e 's/@@JONLINE_ETC@@/#{etc}/' -e 's/^/                /' docs/homebrew_jonline.sh >> tap/Formula/jonline.rb

          cat >> tap/Formula/jonline.rb <<'JONLINE_FORMULA_FOOTER_EOF'
              SCRIPT
              chmod 0755, bin/"jonline"
            end

            test do
              system "#{bin}/jonline", "version"
            end
          end
          JONLINE_FORMULA_FOOTER_EOF

          sed -i "s|FULL_VERSION_PLACEHOLDER|${{ steps.vars.outputs.full_version }}|g" tap/Formula/jonline.rb
          sed -i "s|SHA256_PLACEHOLDER|${{ steps.sha.outputs.sha256 }}|g" tap/Formula/jonline.rb

          cd tap
          git -c user.name="Jonline CI" -c user.email="ci@jonline.io" add Formula/jonline.rb
          if git diff --cached --quiet; then
            echo "No Formula changes to push"
          else
            git -c user.name="Jonline CI" -c user.email="ci@jonline.io" commit -m "jonline ${{ steps.vars.outputs.full_version }}"
            git push origin main
          fi

  create_linux_release:
    name: "Linux: Release"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - create_github_release
      - build_rust_binaries_linux_amd64_static
      - build_rust_binaries_linux_arm64_static
      - build_tamagui_ui
      - build_elm_ui
      - test_consistency

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          be_version="$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')"
          sha_short="$(git rev-parse --short=7 HEAD)"
          echo "be_version=${be_version}" >> $GITHUB_OUTPUT
          echo "sha_short=${sha_short}" >> $GITHUB_OUTPUT
          echo "full_version=${be_version}-${sha_short}" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.full_version }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: actions/cache/restore@v4
        id: web-app-cache
        with:
          path: |
            frontends/tamagui/apps/next/out
            frontends/tamagui/apps/next/out-tamagui
          key: web-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - uses: actions/cache/restore@v4
        id: elm-app-cache
        with:
          path: frontends/elm-spa/public
          key: elm-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

      # Both cached builds were saved from the same "backend/target/release"
      # path, so they're restored one at a time and moved aside immediately --
      # restoring both to that path in one job would have the second clobber
      # the first.
      - uses: actions/cache/restore@v4
        id: rust-linux-amd64-static-app-cache
        with:
          path: backend/target/release
          key: rust-linux-amd64-static-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - run: mv backend/target/release backend/target/release-amd64

      - uses: actions/cache/restore@v4
        id: rust-linux-arm64-static-app-cache
        with:
          path: backend/target/release
          key: rust-linux-arm64-static-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - run: mv backend/target/release backend/target/release-arm64

      # Mirrors deploys/docker/server/Dockerfile's /opt layout (and the
      # Homebrew package layout above), but with binaries for every built
      # architecture side-by-side (arch-suffixed) instead of just one, since
      # this tarball can be extracted onto any Linux machine.
      - name: Assemble Linux release package layout
        run: |
          set -euo pipefail
          PKG=jonline_linux_pkg
          rm -rf "$PKG"
          mkdir -p "$PKG/docs" "$PKG/bin"

          for arch in amd64 arm64; do
            src="backend/target/release-${arch}"
            for bin in jonline disable_cdn_grpc delete_expired_tokens delete_unowned_media \
                       generate_preview_images delete_preview_images set_permission to_db_id to_proto_id; do
              cp "${src}/${bin}" "$PKG/${bin}-${arch}"
              chmod +x "$PKG/${bin}-${arch}"
            done
            mv "$PKG/jonline-${arch}" "$PKG/jonline-server-${arch}"
          done

          echo "${{ steps.vars.outputs.full_version }}" > "$PKG/version"
          cp deploys/docker/continuous_delivery_hash "$PKG/continuous_delivery_hash"
          cp docs/protocol.html "$PKG/docs/protocol.html"

          mkdir -p "$PKG/tamagui_web" "$PKG/tamagui_web_tamagui" "$PKG/elm_web"
          cp -R frontends/tamagui/apps/next/out/. "$PKG/tamagui_web/"
          cp -R frontends/tamagui/apps/next/out-tamagui/. "$PKG/tamagui_web_tamagui/"
          cp -R frontends/elm-spa/public/. "$PKG/elm_web/"

          # grpcurl is useful to have on a jonline instance (see Dockerfile) --
          # one per architecture, matching the version pinned there.
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v1.8.9/grpcurl_1.8.9_linux_x86_64.tar.gz" | tar -xz -C "$PKG" grpcurl
          mv "$PKG/grpcurl" "$PKG/grpcurl-amd64"
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v1.8.9/grpcurl_1.8.9_linux_arm64.tar.gz" | tar -xz -C "$PKG" grpcurl
          mv "$PKG/grpcurl" "$PKG/grpcurl-arm64"

          # docs/linux_jonline.sh is plain, standalone bash aside from the
          # @@JONLINE_PACKAGE_BASE_DIR@@ placeholder -- unlike Homebrew's
          # @@JONLINE_ETC@@ (Ruby-interpolated at `brew install` time), this
          # tarball can be extracted anywhere, so a concrete default install
          # dir is baked in here at CI time instead. It stays as unexpanded
          # shell syntax so it resolves against whichever user's $HOME
          # actually runs it.
          sed 's|@@JONLINE_PACKAGE_BASE_DIR@@|$HOME/.jonline-linux|' docs/linux_jonline.sh > "$PKG/bin/jonline"
          chmod +x "$PKG/bin/jonline"

          tar cjf "jonline-${{ steps.vars.outputs.full_version }}-linux.tar.bz2" -C "$PKG" .

      - name: Compute sha256
        run: sha256sum "jonline-${{ steps.vars.outputs.full_version }}-linux.tar.bz2" > "jonline-${{ steps.vars.outputs.full_version }}-linux.tar.bz2.sha256"

      - name: Upload release assets to v${{ steps.vars.outputs.full_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.vars.outputs.full_version }}" \
            "jonline-${{ steps.vars.outputs.full_version }}-linux.tar.bz2" \
            "jonline-${{ steps.vars.outputs.full_version }}-linux.tar.bz2.sha256" \
            --repo jonlatane/jonline --clobber

  deploy_bullcitysocial:
    name: Deploy Bull City Social
    needs: create_github_release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update deploys/k8s/server_external.yaml to use ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: sed -i 's|${{ steps.vars.outputs.be_version }}|${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}|g' deploys/k8s/server_external.yaml

      - name: Update deploys/k8s/preview_generator.yaml to use ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: sed -i 's|${{ steps.vars.outputs.be_version }}|${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}|g' deploys/k8s/preview_generator.yaml

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 jonline-be

      - name: Deploy to Bull City Social via DigitalOcean Kubernetes
        run: kubectl apply -f deploys/k8s/server_external.yaml -n bullcitysocial

      - name: Verify Server deployment
        run: kubectl rollout status deployment/jonline -n bullcitysocial --timeout 2m

      - name: Deploy Preview Generator
        run: kubectl apply -f deploys/k8s/preview_generator.yaml -n bullcitysocial

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_BULLCITY_SOCIAL }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          curl -sS --fail -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

