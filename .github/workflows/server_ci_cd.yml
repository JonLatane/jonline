# Note that the deploy steps expect that backend/Cargo.toml and deploys/k8s/server_external.yaml
# have the same version number.
name: Server CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        description: "DockerHub username for CD"
        required: true
      DOCKERHUB_TOKEN:
        description: "DockerHub access token for CD"
        required: true
      DIGITALOCEAN_ACCESS_TOKEN:
        description: "DigitalOcean access token for CD"
        required: true
      CLOUDFLARE_TOKEN:
        description: "Cloudflare API token for CD"
        required: true
      CLOUDFLARE_ZONE_JONLINEIO:
        description: "Cloudflare Zone ID for Jonline.io"
        required: true
      CLOUDFLARE_ZONE_BULLCITY_SOCIAL:
        description: "Cloudflare Zone ID for Bull City Social"
        required: true
      CLOUDFLARE_ZONE_OAKCITY_SOCIAL:
        description: "Cloudflare Zone ID for Oak City Social"
        required: true
      HOMEBREW_TAP_TOKEN:
        description: "GitHub PAT with contents:write on JonLatane/homebrew-jonline, used to push Formula updates"
        required: true

jobs:
  test_consistency:
    name: Test Proto/Docs Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: |
          PROTOC_VERSION=29.6
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version
      - uses: ts-graphviz/setup-graphviz@v2
      - uses: subosito/flutter-action@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: npm install --global yarn

      - name: Get yarn cache directory path
        working-directory: frontends/tamagui
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v4
        # id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: jonline-consistency-test-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            jonline-consistency-test-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - working-directory: frontends/tamagui
        run: yarn install
      - working-directory: frontends/tamagui
        run: yarn version:install

      - name: Build Markdown & HTML docs
        # run: make documentation html_docs
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          command: make documentation html_docs

      # TODO: GraphViz versions produce different diagram outputs.
      # My local Homebrew version is 9.0.0 (20230911.1827),
      # GitHub Actions is 2.43.0 (0)
      # - name: Build Graphviz diagrams
      #   run: make graphs

      - name: Install protoc-gen-elm
        run: yarn global add protoc-gen-elm

      - name: Build Protos
        run: make protos

      - name: Check for changes
        run: git diff --exit-code --ignore-matching-lines='//   protoc +v[\\.0-9]+' --ignore-matching-lines='- `protoc` [0-9]'

  # build_flutter_ui:
  #   name: Build Flutter Web UI
  #   runs-on: ubuntu-latest
  #   continue-on-error: true

  #   steps:
  #   - uses: actions/checkout@v4

  #   - name: Extract Versioning Data
  #     id: vars
  #     run: |-
  #       echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
  #       echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
  #   - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
  #     run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

  #   - uses: subosito/flutter-action@v2

  #   - working-directory: frontends/flutter
  #     run: flutter pub get
  #   # - working-directory: frontends/flutter
  #   #   run: flutter test
  #   - working-directory: frontends/flutter
  #     run: flutter build web --web-renderer canvaskit --release --base-href /flutter/

  #   - uses: actions/cache/save@v4
  #     id: flutter-app-cache
  #     with:
  #       path: frontends/flutter/build/web
  #       key: flutter-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_tamagui_ui:
    name: Build Tamagui Web UI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - name: Cache Tamagui web build output
        uses: actions/cache@v4
        id: tamagui-build-cache
        with:
          path: |
            frontends/tamagui/apps/next/out
            frontends/tamagui/apps/next/out-tamagui
          key: tamagui-web-build-${{ runner.os }}-${{ hashFiles('frontends/tamagui/**', 'protos/**') }}

      - uses: actions/setup-node@v4
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        with:
          node-version: 22.x

      - run: npm install --global yarn
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'

      - name: Get yarn cache directory path
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        working-directory: frontends/tamagui
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v4
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        # id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: jonline-tamagui-build-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            jonline-tamagui-build-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - working-directory: frontends/tamagui
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        run: yarn install
      - working-directory: frontends/tamagui
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        run: yarn version:install
      - working-directory: frontends/tamagui
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        run: yarn tsc
      - working-directory: frontends/tamagui
        if: steps.tamagui-build-cache.outputs.cache-hit != 'true'
        run: yarn web:prod:build

      - uses: actions/cache/save@v4
        id: web-app-cache
        with:
          path: |
            frontends/tamagui/apps/next/out
            frontends/tamagui/apps/next/out-tamagui
          key: web-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_elm_ui:
    name: Build Elm SPA Web UI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: jonline-elm-build-${{ runner.os }}-${{ hashFiles('frontends/elm-spa/elm.json') }}
          restore-keys: |
            jonline-elm-build-${{ runner.os }}-

      - run: npm install --global elm elm-spa

      - working-directory: frontends/elm-spa
        run: make build

      - uses: actions/cache/save@v4
        id: elm-app-cache
        with:
          path: frontends/elm-spa/public
          key: elm-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_rust_binaries:
    name: Build Rust Binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target
          # default key
          key: jonline-build-${{ runner.OS }}-github-build
          shared-key: jonline-build-${{ runner.OS }}-github-build

      - working-directory: backend
        run: cargo build --release

      - uses: actions/cache/save@v4
        id: rust-app-cache
        with:
          path: backend/target/release
          key: rust-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_rust_binaries_macos:
    name: Build Rust Binaries (macOS arm64)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-osx-aarch_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version

      # diesel's "postgres" feature links libpq at build time; Homebrew's libpq is
      # keg-only (not symlinked into /opt/homebrew), so point pq-sys/pkg-config at it.
      - name: Install libpq (Homebrew)
        run: |
          brew install libpq
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target
          key: jonline-build-${{ runner.OS }}-arm64-github-build
          shared-key: jonline-build-${{ runner.OS }}-arm64-github-build

      - working-directory: backend
        run: cargo build --release

      - uses: actions/cache/save@v4
        id: rust-macos-app-cache
        with:
          path: backend/target/release
          key: rust-macos-arm64-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_rust_binaries_linux_amd64_static:
    name: Build Rust Binaries (Linux amd64, static libpq)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target
          key: jonline-build-${{ runner.OS }}-amd64-static-github-build
          shared-key: jonline-build-${{ runner.OS }}-amd64-static-github-build

      # `static_pq` vendors & statically compiles libpq (via pq-sys's "bundled"
      # feature -> pq-src), so the resulting binary doesn't depend on a system
      # libpq install -- needed since the Linux release tarball (unlike the
      # server Docker image, which apt-get installs libpq5 itself) can be
      # extracted onto an arbitrary Linux machine.
      - working-directory: backend
        run: cargo build --release --features static_pq

      - uses: actions/cache/save@v4
        id: rust-linux-amd64-static-app-cache
        with:
          path: backend/target/release
          key: rust-linux-amd64-static-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  build_rust_binaries_linux_arm64_static:
    name: Build Rust Binaries (Linux arm64, static libpq)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-aarch_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target
          key: jonline-build-${{ runner.OS }}-arm64-static-github-build
          shared-key: jonline-build-${{ runner.OS }}-arm64-static-github-build

      - working-directory: backend
        run: cargo build --release --features static_pq

      - uses: actions/cache/save@v4
        id: rust-linux-arm64-static-app-cache
        with:
          path: backend/target/release
          key: rust-linux-arm64-static-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

  test_rust_binaries:
    name: Test Rust Binaries
    runs-on: ubuntu-latest
    # Backs the DB-backed specs under backend/src/tests/ (see src/tests/factories.rs), which run
    # against TEST_DATABASE_URL - a dedicated `jonline_test` DB, analogous to a Rails dev/test
    # split, kept separate from the `jonline_dev` DB used by a real running server. Migrations are
    # applied automatically on first test run, so no separate migration step is needed here.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jonline_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/jonline_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: |
          PROTOC_VERSION=26.1
          PROTOC_ZIP=protoc-${PROTOC_VERSION}-linux-x86_64.zip
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          sudo unzip -o "$PROTOC_ZIP" -d /usr/local bin/protoc 'include/*'
          rm "$PROTOC_ZIP"
          protoc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target
          # default key
          key: jonline-test-${{ runner.OS }}-github-test
          shared-key: jonline-test-${{ runner.OS }}-github-test
      - working-directory: backend
        run: cargo test --all-features
      - working-directory: backend
        run: cargo build --all-features

  test_tamagui_ui:
    name: Test Tamagui Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Tamagui test result
        uses: actions/cache@v4
        id: tamagui-test-cache
        with:
          path: frontends/tamagui/.test-passed
          key: tamagui-web-test-${{ runner.os }}-${{ hashFiles('frontends/tamagui/**', 'protos/**') }}

      - uses: actions/setup-node@v4
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        with:
          node-version: 22.x
      - run: npm install --global yarn
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'

      - name: Get yarn cache directory path
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        working-directory: frontends/tamagui
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v4
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        # id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: jonline-tamagui-test-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            jonline-tamagui-test-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - working-directory: frontends/tamagui
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        run: yarn install
      - working-directory: frontends/tamagui
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        run: yarn version:install
      - working-directory: frontends/tamagui
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        run: yarn build
      - working-directory: frontends/tamagui
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        run: yarn tsc

      - name: Mark Tamagui tests passed
        if: steps.tamagui-test-cache.outputs.cache-hit != 'true'
        run: touch frontends/tamagui/.test-passed

  # test_flutter_ui:
  #   name: Test Flutter Web UI
  #   runs-on: ubuntu-latest
  #   continue-on-error: true
  #   steps:
  #   - uses: actions/checkout@v4
  #   - uses: subosito/flutter-action@v2
  #     with:
  #       channel: 'stable'
  #   - working-directory: frontends/flutter
  #     run: flutter pub get
  #   - working-directory: frontends/flutter
  #     run: flutter test
  #   - working-directory: frontends/flutter
  #     run: flutter build web

  push_server:
    name: "DockerHub: Server"
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/experiments/elm-spa'
    runs-on: ubuntu-latest
    needs:
      # - build_flutter_ui
      - build_tamagui_ui
      - build_elm_ui
      - build_rust_binaries
      - test_consistency

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: actions/cache/restore@v4
        id: flutter-app-cache
        continue-on-error: true
        with:
          path: frontends/flutter/build/web
          key: flutter-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - run: mkdir -p frontends/flutter/build/web
      - uses: actions/cache/restore@v4
        id: web-app-cache
        with:
          path: |
            frontends/tamagui/apps/next/out
            frontends/tamagui/apps/next/out-tamagui
          key: web-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - uses: actions/cache/restore@v4
        id: elm-app-cache
        with:
          path: frontends/elm-spa/public
          key: elm-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
      - uses: actions/cache/restore@v4
        id: rust-app-cache
        with:
          path: backend/target/release
          key: rust-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rename Rust binaries for Dockerfiles
        run: >-
          mv backend/target/release/jonline backend/target/release/jonline__server_release &&
          mv backend/target/release/disable_cdn_grpc backend/target/release/disable_cdn_grpc__server_release &&
          mv backend/target/release/delete_expired_tokens backend/target/release/delete_expired_tokens__server_release &&
          mv backend/target/release/delete_unowned_media backend/target/release/delete_unowned_media__server_release &&
          mv backend/target/release/generate_preview_images backend/target/release/generate_preview_images__server_release &&
          mv backend/target/release/delete_preview_images backend/target/release/delete_preview_images__server_release &&
          mv backend/target/release/set_permission backend/target/release/set_permission__server_release &&
          mv backend/target/release/to_db_id backend/target/release/to_db_id__server_release &&
          mv backend/target/release/to_proto_id backend/target/release/to_proto_id__server_release

      - name: Build and push jonline image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jonline:${{ steps.vars.outputs.be_version }},${{ secrets.DOCKERHUB_USERNAME }}/jonline:${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
          context: .
          file: ./deploys/docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64

  push_preview_generator:
    name: "DockerHub: Preview Generator"
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/experiments/elm-spa'
    runs-on: ubuntu-latest
    needs:
      - build_rust_binaries
      - test_consistency

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
      - name: Store Versioning Data for release ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: echo ${{ steps.vars.outputs.sha_short }} > deploys/docker/continuous_delivery_hash

      - uses: actions/cache/restore@v4
        id: rust-app-cache
        with:
          path: backend/target/release
          key: rust-${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rename Rust binaries for Dockerfiles
        run: >-
          mv backend/target/release/jonline backend/target/release/jonline__server_release &&
          mv backend/target/release/disable_cdn_grpc backend/target/release/disable_cdn_grpc__server_release &&
          mv backend/target/release/delete_expired_tokens backend/target/release/delete_expired_tokens__server_release &&
          mv backend/target/release/delete_unowned_media backend/target/release/delete_unowned_media__server_release &&
          mv backend/target/release/generate_preview_images backend/target/release/generate_preview_images__server_release &&
          mv backend/target/release/delete_preview_images backend/target/release/delete_preview_images__server_release &&
          mv backend/target/release/set_permission backend/target/release/set_permission__server_release

      - name: Build and push jonline_preview_generator image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jonline_preview_generator:${{ steps.vars.outputs.be_version }},${{ secrets.DOCKERHUB_USERNAME }}/jonline_preview_generator:${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
          context: .
          file: ./deploys/docker/preview_generator/Dockerfile
          platforms: linux/amd64,linux/arm64

  deploy_jonlineio_server:
    name: Deploy Jonline.io Server
    if: github.ref == 'refs/heads/main'
    needs:
      - test_rust_binaries
      # - test_flutter_ui
      - test_tamagui_ui
      - push_server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Versioning Data
        id: vars
        run: |-
          echo "be_version=$(cat backend/Cargo.toml | grep 'version =' | sed -n 1p | awk '{print $3;}' | sed 's/"//g')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update deploys/k8s/server_external.yaml to use ${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}
        run: sed -i 's|${{ steps.vars.outputs.be_version }}|${{ steps.vars.outputs.be_version }}-${{ steps.vars.outputs.sha_short }}|g' deploys/k8s/server_external.yaml

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 jonline-be

      # If you haven't already integrated with your registry and only want workloads in a particular namespace to be able to pull
      # from your registry, uncomment the next two commands.
      # - name: Upload credentials of your registry to your DigitalOcean Kubernetes cluster
      #   run: doctl registry kubernetes-manifest | kubectl apply -f -

      # - name: Reference the secret you just uploaded as an imagePullSecrets
      #   run: "kubectl patch serviceaccount default -p '{\"imagePullSecrets\": [{\"name\": \"registry-<your-registry-name>`\"}]}'"

      - name: Deploy to Jonline.io via DigitalOcean Kubernetes
        run: kubectl apply -f deploys/k8s/server_external.yaml -n jonline

      - name: Verify Server deployment
        run: kubectl rollout status deployment/jonline -n jonline --timeout 2m

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_JONLINEIO }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          curl -sS --fail -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

