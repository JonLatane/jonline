<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- "black-translucent" (rather than "default") makes the status bar
       transparent when this is running as a home-screen/standalone app on
       iOS, letting .navbar's own background (see nav.css's
       `padding-top: env(safe-area-inset-top)`) show through underneath it --
       "default"/"black" are opaque, fixed OS colors that never reflect the
       page. iOS never reads `theme-color` for a standalone app's status bar
       (only for a regular Safari tab's toolbar, which the two tags below still
       cover), so this is the only way to tint it, at the cost of the status
       bar's icons/text always being light-colored (iOS's choice, not
       adjustable per-color). -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#16181d" media="(prefers-color-scheme: dark)">
  <title>Jonline</title>
  <meta name="description"
    content="Jonline is a decentralized, federated, easy-to-deploy social network built in Rust and gRPC, with Flutter and Web frontends.">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <!-- These placeholders are replaced server-side per-request with page-specific
       link-preview data -- see `spa_web_path`'s `spa_web_path` fn in
       `backend/src/web/spa_web_path.rs`, which does the same replacements for
       Tamagui's static export (see `apps/next/pages/_document.tsx`). The
       marker strings must match exactly between the two templates. -->
  <meta property="og:title" content="Jonline Social Link" />
  <meta property="og:description" content="A link from a fediverse community with events, posts, and realtime chat" />
  <meta property="og:image" content="/favicon.ico" />
  <link rel="manifest" href="/manifest.json">
  <script>
    // This app is served from either `/` or `/elm` (see
    // `backend/src/web/elm_web.rs`) -- this regex must agree with
    // `Shared.elm`'s `basePathFromPath`, which does the equivalent detection
    // in Elm for routing/link purposes once the app is running.
    var jonlineBasePath = /^\/elm(\/|$)/.test(window.location.pathname) ? "/elm" : "";
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/main.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/ui/modal.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/ui/switch.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/ui/flip.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/ui/reordering.css">');

    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/media.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/profiles.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/posts.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/shared/nav.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/shared/accounts_panel.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/shared/starred_posts_panel.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/shared/markdown_panel.css">');
    document.write('<link rel="stylesheet" href="' + jonlineBasePath + '/style/shared/media_viewer_panel.css">');

    // Markdown rendering (see `public/markdown.js`) -- vendored rather than
    // CDN-loaded, so the app keeps working offline/behind a firewall.
    document.write('<script src="' + jonlineBasePath + '/vendor/marked.js"><\/script>');
    document.write('<script src="' + jonlineBasePath + '/vendor/highlight.min.js"><\/script>');
    document.write('<script src="' + jonlineBasePath + '/vendor/dompurify.min.js"><\/script>');
    document.write('<script src="' + jonlineBasePath + '/markdown.js"><\/script>');

    // Same "auto" resolution `Shared.effectiveDarkMode` does in Elm -- kept in
    // sync with it via the `setTheme` port subscription below, which fires
    // once at startup (`Shared.init`) and again on every change. This has to
    // live in `<head>`, not `<body>` -- `Browser.application` (see `Main.elm`)
    // takes ownership of `<body>`'s contents on init and would wipe out any
    // element written there that Elm doesn't itself know about.
    document.write(
      '<link id="hljs-theme" rel="stylesheet" data-base-href="' + jonlineBasePath + '/vendor/" href="' +
      jonlineBasePath + '/vendor/' +
      (((localStorage.getItem("jonlineThemePreference") || "auto") === "dark" ||
        ((localStorage.getItem("jonlineThemePreference") || "auto") === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches))
        ? "highlight-dark.css" : "highlight-light.css") +
      '">'
    );
  </script>
</head>

<body>
  <script>
    document.write('<script src="' + jonlineBasePath + '/dist/elm.js"><\/script>');
  </script>
  <script>
    var storedState = null;
    try {
      var raw = localStorage.getItem("jonlineState");
      storedState = raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.error("Failed to read stored Jonline state", e);
    }

    var storedThemePreference = localStorage.getItem("jonlineThemePreference") || "auto";
    var darkMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    var storedStarredPosts = [];
    try {
      var rawStarredPosts = localStorage.getItem("jonlineStarredPosts");
      storedStarredPosts = rawStarredPosts ? JSON.parse(rawStarredPosts) : [];
    } catch (e) {
      console.error("Failed to read stored starred posts", e);
    }

    var storedFederatedAuthKeyPair = null;
    try {
      var rawFederatedAuthKeyPair = localStorage.getItem("jonlineFederatedAuthKeyPair");
      storedFederatedAuthKeyPair = rawFederatedAuthKeyPair ? JSON.parse(rawFederatedAuthKeyPair) : null;
    } catch (e) {
      console.error("Failed to read stored federated auth keypair", e);
    }

    var app = Elm.Main.init({
      flags: {
        state: storedState,
        systemPrefersDark: darkMediaQuery.matches,
        themePreference: storedThemePreference,
        starredPosts: storedStarredPosts,
        federatedAuthKeyPair: storedFederatedAuthKeyPair
      }
    });

    // Lets multiple tabs on the same origin stay in sync (e.g. signing in on
    // one tab shows the new account on all the others) -- every tab opens the
    // same named channel, so posting to it reaches every *other* tab (a
    // channel never receives its own posted messages) without any tab having
    // to poll localStorage. Falls back to a same-tab-only no-op where
    // `BroadcastChannel` doesn't exist (very old browsers).
    var accountsAndServersChannel = window.BroadcastChannel ? new BroadcastChannel("jonlineAccountsAndServers") : null;
    if (accountsAndServersChannel) {
      accountsAndServersChannel.onmessage = function (e) {
        app.ports.accountsAndServersUpdated.send(e.data);
      };
    }

    app.ports.persistAccountsAndServers.subscribe(function (state) {
      localStorage.setItem("jonlineState", JSON.stringify(state));
      if (accountsAndServersChannel) {
        accountsAndServersChannel.postMessage(state);
      }
    });

    app.ports.persistThemePreference.subscribe(function (preference) {
      localStorage.setItem("jonlineThemePreference", preference);
    });

    // Same cross-tab sync as `accountsAndServersChannel`, above.
    var starredPostsChannel = window.BroadcastChannel ? new BroadcastChannel("jonlineStarredPosts") : null;
    if (starredPostsChannel) {
      starredPostsChannel.onmessage = function (e) {
        app.ports.starredPostsUpdated.send(e.data);
      };
    }

    app.ports.persistStarredPosts.subscribe(function (starredPosts) {
      localStorage.setItem("jonlineStarredPosts", JSON.stringify(starredPosts));
      if (starredPostsChannel) {
        starredPostsChannel.postMessage(starredPosts);
      }
    });

    var currentThemePreference = storedThemePreference;

    app.ports.setTheme.subscribe(function (theme) {
      currentThemePreference = theme;
      if (theme === "auto") {
        document.documentElement.removeAttribute("data-theme");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
      window.jonlineUpdateCodeTheme(theme === "dark" || (theme === "auto" && darkMediaQuery.matches));
    });

    app.ports.setNavBarColor.subscribe(function (color) {
      document.querySelectorAll('meta[name="theme-color"]').forEach(function (m) {
        m.setAttribute("content", color);
      });
    });

    darkMediaQuery.addEventListener("change", function (e) {
      app.ports.systemPrefersDarkChanged.send(e.matches);
      if (currentThemePreference === "auto") {
        window.jonlineUpdateCodeTheme(e.matches);
      }
    });

    // FEDERATED AUTH -- SSO-style cross-server account hand-off (see
    // `Shared.FederatedAuth` and `Ports.elm`). Real ECIES-style hybrid
    // encryption -- ephemeral ECDH (P-256) + HKDF-SHA256 + AES-256-GCM --
    // via the browser's WebCrypto `SubtleCrypto` API, since Elm has no
    // crypto/bigint support of its own.

    function base64UrlEncode(bytes) {
      var binary = "";
      var arr = new Uint8Array(bytes);
      for (var i = 0; i < arr.length; i++) {
        binary += String.fromCharCode(arr[i]);
      }
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function base64UrlDecode(str) {
      var padded = str.replace(/-/g, "+").replace(/_/g, "/");
      while (padded.length % 4 !== 0) {
        padded += "=";
      }
      var binary = atob(padded);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    // Both sides of an ECDH exchange derive the same shared secret from
    // their own private key and the other side's public key; HKDF turns
    // that into a proper AES-256-GCM key rather than using the raw shared
    // secret directly.
    function deriveAesKey(privateKey, publicKey) {
      return window.crypto.subtle
        .deriveBits({ name: "ECDH", public: publicKey }, privateKey, 256)
        .then(function (sharedSecret) {
          return window.crypto.subtle.importKey("raw", sharedSecret, "HKDF", false, ["deriveKey"]);
        })
        .then(function (hkdfKey) {
          return window.crypto.subtle.deriveKey(
            { name: "HKDF", hash: "SHA-256", salt: new Uint8Array(0), info: new Uint8Array(0) },
            hkdfKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
          );
        });
    }

    // `window.crypto.subtle` only exists in "secure contexts" -- HTTPS, or
    // plain HTTP on `localhost`/`127.0.0.1` specifically (browsers don't
    // extend that leniency to other hostnames, e.g. a `.local` mDNS alias,
    // even on the same machine). Accessing `.subtle`/its methods when it's
    // undefined throws *synchronously*, before any `.then`/`.catch` chain
    // exists to catch it -- left unguarded, that exception escapes into
    // Elm's scheduler and permanently wedges it (every port handler below
    // runs inside the same synchronous effects-dispatch loop), silently
    // breaking the entire app rather than just this feature. So every entry
    // point here checks up front and fails soft instead.
    function subtleCryptoAvailable() {
      return !!(window.crypto && window.crypto.subtle);
    }

    app.ports.federatedAuthGenerateKeyPair.subscribe(function () {
      if (!subtleCryptoAvailable()) {
        console.warn("Cross-host auth unavailable: WebCrypto requires a secure context (HTTPS, or http://localhost).");
        return;
      }
      try {
        window.crypto.subtle
          .generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveBits"])
          .then(function (keyPair) {
            return Promise.all([
              window.crypto.subtle.exportKey("raw", keyPair.publicKey),
              window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey)
            ]);
          })
          .then(function (exported) {
            app.ports.federatedAuthKeyPairGenerated.send({
              publicKey: base64UrlEncode(exported[0]),
              privateKey: base64UrlEncode(exported[1])
            });
          })
          .catch(function (e) {
            console.error("Failed to generate federated auth keypair", e);
          });
      } catch (e) {
        console.error("Failed to generate federated auth keypair", e);
      }
    });

    app.ports.persistFederatedAuthKeyPair.subscribe(function (keyPair) {
      localStorage.setItem("jonlineFederatedAuthKeyPair", JSON.stringify(keyPair));
    });

    app.ports.clearFederatedAuthKeyPair.subscribe(function () {
      localStorage.removeItem("jonlineFederatedAuthKeyPair");
    });

    // Encrypts `request.plaintext` to `request.publicKey` (the recipient's
    // public key) using a fresh, one-time ephemeral ECDH keypair -- the
    // encoded result is `ephemeralPublicKey.iv.ciphertext`, each part
    // base64url, dot-joined (`@` is reserved for the `/auth/to` route's own
    // `key@host` split).
    app.ports.federatedAuthEncrypt.subscribe(function (request) {
      if (!subtleCryptoAvailable()) {
        app.ports.federatedAuthEncrypted.send({ ok: false, value: "Cross-host auth requires a secure context (HTTPS, or http://localhost)." });
        return;
      }
      var ephemeralKeyPair;
      var iv;
      try {
        window.crypto.subtle
          .importKey("raw", base64UrlDecode(request.publicKey), { name: "ECDH", namedCurve: "P-256" }, false, [])
          .then(function (recipientPublicKey) {
            return window.crypto.subtle
              .generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveBits"])
              .then(function (kp) {
                ephemeralKeyPair = kp;
                return deriveAesKey(kp.privateKey, recipientPublicKey);
              });
          })
          .then(function (aesKey) {
            iv = window.crypto.getRandomValues(new Uint8Array(12));
            var plaintextBytes = new TextEncoder().encode(request.plaintext);
            return Promise.all([
              window.crypto.subtle.exportKey("raw", ephemeralKeyPair.publicKey),
              window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, aesKey, plaintextBytes)
            ]);
          })
          .then(function (results) {
            var encoded =
              base64UrlEncode(results[0]) + "." + base64UrlEncode(iv) + "." + base64UrlEncode(results[1]);
            app.ports.federatedAuthEncrypted.send({ ok: true, value: encoded });
          })
          .catch(function (e) {
            app.ports.federatedAuthEncrypted.send({ ok: false, value: String((e && e.message) || e) });
          });
      } catch (e) {
        app.ports.federatedAuthEncrypted.send({ ok: false, value: String((e && e.message) || e) });
      }
    });

    // Inverse of the above: `request.encoded` was produced by some other
    // origin's `federatedAuthEncrypt` against this origin's own public key,
    // so decrypting it just needs this origin's matching private key.
    app.ports.federatedAuthDecrypt.subscribe(function (request) {
      if (!subtleCryptoAvailable()) {
        app.ports.federatedAuthDecrypted.send({ ok: false, value: "Cross-host auth requires a secure context (HTTPS, or http://localhost)." });
        return;
      }
      var ephemeralPublicKeyBytes, iv, ciphertext;
      try {
        var parts = request.encoded.split(".");
        if (parts.length !== 3) {
          throw new Error("Malformed encrypted account data.");
        }
        ephemeralPublicKeyBytes = base64UrlDecode(parts[0]);
        iv = base64UrlDecode(parts[1]);
        ciphertext = base64UrlDecode(parts[2]);
      } catch (e) {
        app.ports.federatedAuthDecrypted.send({ ok: false, value: String((e && e.message) || e) });
        return;
      }

      try {
        Promise.all([
          window.crypto.subtle.importKey(
            "pkcs8", base64UrlDecode(request.privateKey), { name: "ECDH", namedCurve: "P-256" }, false, ["deriveBits"]
          ),
          window.crypto.subtle.importKey("raw", ephemeralPublicKeyBytes, { name: "ECDH", namedCurve: "P-256" }, false, [])
        ])
          .then(function (keys) {
            return deriveAesKey(keys[0], keys[1]);
          })
          .then(function (aesKey) {
            return window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, aesKey, ciphertext);
          })
          .then(function (plaintextBytes) {
            app.ports.federatedAuthDecrypted.send({ ok: true, value: new TextDecoder().decode(plaintextBytes) });
          })
          .catch(function (e) {
            app.ports.federatedAuthDecrypted.send({ ok: false, value: String((e && e.message) || e) });
          });
      } catch (e) {
        app.ports.federatedAuthDecrypted.send({ ok: false, value: String((e && e.message) || e) });
      }
    });
  </script>
</body>

</html>
