<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <script src="/dist/elm.js"></script>
  <script>
    var storedState = null;
    try {
      var raw = localStorage.getItem("jonlineState");
      storedState = raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.error("Failed to read stored Jonline state", e);
    }

    var app = Elm.Main.init({ flags: storedState });

    app.ports.persist.subscribe(function (state) {
      localStorage.setItem("jonlineState", JSON.stringify(state));
    });
  </script>
</body>
</html>
