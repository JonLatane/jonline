<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <script src="/dist/elm.js"></script>
  <script>
    var storedAccount = null;
    try {
      var raw = localStorage.getItem("jonlineAccount");
      storedAccount = raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.error("Failed to read stored Jonline account", e);
    }

    var app = Elm.Main.init({ flags: storedAccount });

    app.ports.saveAccount.subscribe(function (account) {
      localStorage.setItem("jonlineAccount", JSON.stringify(account));
    });

    app.ports.clearAccount.subscribe(function () {
      localStorage.removeItem("jonlineAccount");
    });
  </script>
</body>
</html>
